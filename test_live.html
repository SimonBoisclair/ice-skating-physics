<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>LIVE Physics Test Suite — Warp GPU</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'JetBrains Mono','Fira Code',monospace; overflow:hidden; display:flex; }

#scene-container { flex:1; position:relative; }
canvas { display:block; }

#panel {
  width:420px; height:100vh; background:#161b22; border-left:1px solid #30363d;
  display:flex; flex-direction:column; overflow:hidden;
}

#header {
  padding:12px 16px; background:#1c2128; border-bottom:1px solid #30363d;
}
#header h1 { font-size:14px; color:#58a6ff; margin-bottom:4px; }
#header .subtitle { font-size:11px; color:#8b949e; }

#live-stats {
  padding:10px 16px; background:#1c2128; border-bottom:1px solid #30363d;
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;
}
.live-stat { text-align:center; }
.live-stat .label { font-size:9px; color:#8b949e; text-transform:uppercase; letter-spacing:1px; }
.live-stat .value { font-size:16px; font-weight:bold; color:#fff; }
.live-stat .value.green { color:#3fb950; }
.live-stat .value.red { color:#f85149; }
.live-stat .value.blue { color:#58a6ff; }
.live-stat .value.yellow { color:#d29922; }

#progress-bar {
  padding:8px 16px; background:#1c2128; border-bottom:1px solid #30363d;
}
#progress-bar .bar-track {
  height:6px; background:#21262d; border-radius:3px; overflow:hidden;
}
#progress-bar .bar-fill {
  height:100%; background:linear-gradient(90deg, #3fb950, #58a6ff); border-radius:3px;
  transition: width 0.3s ease;
}
#progress-text {
  display:flex; justify-content:space-between; font-size:10px; color:#8b949e; margin-top:4px;
}

#test-log {
  flex:1; overflow-y:auto; padding:8px 0; scrollbar-width:thin;
  scrollbar-color:#30363d #161b22;
}

.test-entry {
  padding:6px 16px; border-left:3px solid transparent; transition: all 0.2s;
}
.test-entry.running {
  background:#1c2128; border-left-color:#58a6ff;
}
.test-entry.passed {
  border-left-color:#3fb950;
}
.test-entry.failed {
  border-left-color:#f85149;
}
.test-entry.pending {
  opacity:0.4;
}
.test-name {
  font-size:11px; font-weight:bold; margin-bottom:2px;
}
.test-checks {
  font-size:10px; color:#8b949e; padding-left:8px;
}
.check-line {
  margin:1px 0; display:flex; gap:6px; align-items:flex-start;
}
.check-icon { flex-shrink:0; }
.check-pass .check-icon { color:#3fb950; }
.check-fail .check-icon { color:#f85149; }
.check-text { word-break:break-all; }
.test-values {
  font-size:9px; color:#6e7681; margin-top:2px; padding-left:8px;
}

#current-test-display {
  padding:8px 16px; background:#0d1117; border-top:1px solid #30363d;
  font-size:11px; color:#58a6ff; text-align:center; min-height:32px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.spinner {
  width:12px; height:12px; border:2px solid #30363d; border-top-color:#58a6ff;
  border-radius:50%; animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

#score-display {
  padding:12px 16px; background:#1c2128; border-top:1px solid #30363d;
  text-align:center;
}
#score-display .big { font-size:28px; font-weight:bold; }
#score-display .detail { font-size:10px; color:#8b949e; margin-top:4px; }

#controls-bar {
  padding:8px 16px; background:#0d1117; border-top:1px solid #30363d;
  display:flex; gap:8px; align-items:center; justify-content:center;
}
#controls-bar button {
  background:#238636; color:#fff; border:none; padding:8px 20px;
  border-radius:6px; cursor:pointer; font-size:12px; font-weight:bold;
  font-family:inherit;
}
#controls-bar button:hover { background:#2ea043; }
#controls-bar button:disabled { background:#21262d; color:#484f58; cursor:default; }
#controls-bar button.stop { background:#da3633; }
#controls-bar button.stop:hover { background:#f85149; }

/* 3D overlay info */
#overlay-info {
  position:absolute; top:10px; left:10px; background:rgba(13,17,23,0.85);
  padding:8px 12px; border-radius:6px; border:1px solid #30363d;
  font-size:11px; z-index:5;
}
#overlay-info .oi-row { display:flex; gap:12px; margin:2px 0; }
#overlay-info .oi-label { color:#8b949e; min-width:60px; }
#overlay-info .oi-val { color:#fff; font-weight:bold; }
</style>
</head>
<body>

<div id="scene-container">
  <div id="overlay-info">
    <div class="oi-row"><span class="oi-label">Speed:</span><span class="oi-val" id="ov-speed">0.000 m/s</span></div>
    <div class="oi-row"><span class="oi-label">V along:</span><span class="oi-val" style="color:#3fb950" id="ov-va">0.000</span></div>
    <div class="oi-row"><span class="oi-label">V perp:</span><span class="oi-val" style="color:#f85149" id="ov-vp">0.000</span></div>
    <div class="oi-row"><span class="oi-label">F lateral:</span><span class="oi-val" style="color:#f85149" id="ov-flat">0 N</span></div>
    <div class="oi-row"><span class="oi-label">F along:</span><span class="oi-val" style="color:#3fb950" id="ov-falong">0 N</span></div>
    <div class="oi-row"><span class="oi-label">Zone:</span><span class="oi-val" style="color:#d29922" id="ov-zone">—</span></div>
    <div class="oi-row"><span class="oi-label">Lean:</span><span class="oi-val" id="ov-lean">15.0°</span></div>
    <div class="oi-row"><span class="oi-label">Engine:</span><span class="oi-val" style="color:#58a6ff" id="ov-engine">connecting...</span></div>
  </div>
</div>

<div id="panel">
  <div id="header">
    <h1>LIVE PHYSICS TEST SUITE</h1>
    <div class="subtitle">Based on <a href="https://www.real-world-physics-problems.com/physics-of-ice-skating.html" target="_blank" style="color:#58a6ff">real-world-physics-problems.com</a> · RTX 3090</div>
  </div>

  <div id="live-stats">
    <div class="live-stat"><div class="label">Speed</div><div class="value blue" id="ls-speed">0.00</div></div>
    <div class="live-stat"><div class="label">V Along</div><div class="value green" id="ls-va">0.00</div></div>
    <div class="live-stat"><div class="label">V Perp</div><div class="value red" id="ls-vp">0.00</div></div>
    <div class="live-stat"><div class="label">F Lateral</div><div class="value red" id="ls-flat">0</div></div>
    <div class="live-stat"><div class="label">Aniso</div><div class="value yellow" id="ls-aniso">—</div></div>
    <div class="live-stat"><div class="label">SPS</div><div class="value" id="ls-sps">—</div></div>
  </div>

  <div id="progress-bar">
    <div class="bar-track"><div class="bar-fill" id="pbar" style="width:0%"></div></div>
    <div id="progress-text"><span id="prog-label">Ready to run</span><span id="prog-count">0/46</span></div>
  </div>

  <div id="test-log"></div>

  <div id="current-test-display">Press RUN to start the test suite</div>

  <div id="score-display" style="display:none;">
    <div class="big" id="final-score"></div>
    <div class="detail" id="final-detail"></div>
  </div>

  <div id="controls-bar">
    <button id="btn-run" onclick="startTests()">RUN TEST SUITE</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ── WebSocket ──
let ws = null, wsReady = false, latestState = null;
const states = [];

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = () => {
    wsReady = true;
    document.getElementById('ov-engine').textContent = 'connected';
  };
  ws.onmessage = (e) => {
    const s = JSON.parse(e.data);
    if (s.type === 'state') {
      latestState = s;
      states.push(s);
      if (states.length > 500) states.splice(0, 200);
    }
  };
  ws.onclose = () => { wsReady = false; setTimeout(connectWS, 1000); };
  ws.onerror = () => ws.close();
}
connectWS();

function wsSend(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

// ── Three.js Scene ──
const container = document.getElementById('scene-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);

const W = container.clientWidth, H = container.clientHeight;
const camera = new THREE.PerspectiveCamera(50, W / H, 0.01, 100);
camera.position.set(1.5, -1.5, 1.5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0.02);
controls.update();

scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
dirLight.position.set(2, -3, 5);
scene.add(dirLight);

// Ice surface
const iceMat = new THREE.MeshStandardMaterial({ color:0x1a2332, roughness:0.05, metalness:0.1, transparent:true, opacity:0.9 });
const iceMesh = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), iceMat);
iceMesh.receiveShadow = true;
scene.add(iceMesh);

// Grid
const grid = new THREE.GridHelper(20, 200, 0x1a3050, 0x1a3050);
grid.rotation.x = Math.PI / 2;
grid.position.z = 0.0005;
scene.add(grid);

// ── Blade Geometry Constants ──
const BLADE_LEN = 0.28, BLADE_T = 0.003, BLADE_H = 0.03;
const HOLLOW_R = (5/8) * 0.0254;
const PROFILE_ZONES = [0.08, 0.18, 0.24, 0.24, 0.18, 0.08];
const PROFILE_RADII_FT = [0.15, 15, 12, 9, 6, 0.15];
const ZONE_COLORS_HEX = [0xff4444, 0x9b59b6, 0x3498db, 0x2ecc40, 0xf1c40f, 0xff4444];
const BLADE_HALF_LEN = BLADE_LEN / 2;
const MAX_PITCH_RAD = Math.asin(0.05 / BLADE_LEN);

function computeProfileCurve(bladeLen, profile) {
  const n = 400, dx = bladeLen / n;
  const radiiM = profile.radii.map(r => r * 0.3048);
  const zoneBounds = []; let cumFrac = 0;
  for (const f of profile.zones) { zoneBounds.push(cumFrac); cumFrac += f; }
  zoneBounds.push(1.0);
  const halfLen = bladeLen / 2;
  function getQuadRadius(x) {
    const t = (x + halfLen) / bladeLen;
    for (let z = 1; z < profile.radii.length - 1; z++) { if (t <= zoneBounds[z+1]+0.001) return radiiM[z]; }
    return radiiM[profile.radii.length - 2];
  }
  function getZoneIndex(x) {
    const t = (x + halfLen) / bladeLen;
    for (let z = 0; z < profile.radii.length; z++) { if (t <= zoneBounds[z+1]+0.001) return z; }
    return profile.radii.length - 1;
  }
  const yArr = new Float64Array(n+1), slopeArr = new Float64Array(n+1), zoneArr = new Int32Array(n+1);
  const centerIdx = Math.round(n/2);
  const heelBoundIdx = Math.round(zoneBounds[1]*n);
  const toeBoundIdx = Math.round(zoneBounds[profile.radii.length-1]*n);
  for (let i = centerIdx; i < toeBoundIdx && i < n; i++) {
    const x = -halfLen + (i/n)*bladeLen, R = getQuadRadius(x);
    slopeArr[i+1] = slopeArr[i] + (1.0/R)*dx;
    yArr[i+1] = yArr[i] + slopeArr[i]*dx + 0.5*(1.0/R)*dx*dx;
    zoneArr[i] = getZoneIndex(x);
  }
  for (let i = centerIdx; i > heelBoundIdx && i > 0; i--) {
    const x = -halfLen + (i/n)*bladeLen, R = getQuadRadius(x);
    slopeArr[i-1] = slopeArr[i] - (1.0/R)*dx;
    yArr[i-1] = yArr[i] - slopeArr[i]*dx + 0.5*(1.0/R)*dx*dx;
    zoneArr[i-1] = getZoneIndex(-halfLen + ((i-1)/n)*bladeLen);
  }
  if (toeBoundIdx <= n) zoneArr[toeBoundIdx] = getZoneIndex(-halfLen + (toeBoundIdx/n)*bladeLen);
  const tipRiseHeight = BLADE_H * 0.85, tipPower = 3.0;
  { const startY = yArr[toeBoundIdx], startSlope = slopeArr[toeBoundIdx], tipLen = (n-toeBoundIdx)*dx;
    for (let i = toeBoundIdx+1; i <= n; i++) {
      const localX = (i-toeBoundIdx)*dx, t = localX/tipLen;
      yArr[i] = startY + startSlope*localX + tipRiseHeight*Math.pow(t,tipPower);
      zoneArr[i] = profile.radii.length - 1;
    }
  }
  { const startY = yArr[heelBoundIdx], startSlope = slopeArr[heelBoundIdx], tipLen = heelBoundIdx*dx;
    for (let i = heelBoundIdx-1; i >= 0; i--) {
      const localX = (heelBoundIdx-i)*dx, t = localX/tipLen;
      yArr[i] = startY - startSlope*localX + tipRiseHeight*Math.pow(t,tipPower);
      zoneArr[i] = 0;
    }
  }
  let minY = Infinity;
  for (let i = 0; i <= n; i++) minY = Math.min(minY, yArr[i]);
  for (let i = 0; i <= n; i++) yArr[i] -= minY;
  return { y: yArr, slope: slopeArr, zone: zoneArr, n, halfLen };
}

function buildBladeAndHolder() {
  const group = new THREE.Group();
  const profile = { zones: PROFILE_ZONES, radii: PROFILE_RADII_FT };
  const bladeLen = BLADE_LEN, bladeH = BLADE_H, bladeT = BLADE_T, hollowR = HOLLOW_R;
  const halfLen = bladeLen/2, halfT = bladeT/2;
  const curve = computeProfileCurve(bladeLen, profile);
  function bottomYInterp(x) {
    const t = (x+halfLen)/bladeLen, fi = t*curve.n;
    const i0 = Math.max(0,Math.min(curve.n-1,Math.floor(fi))), i1 = Math.min(curve.n,i0+1);
    return curve.y[i0]*(1-(fi-i0)) + curve.y[i1]*(fi-i0);
  }
  function getZone(x) { const t=(x+halfLen)/bladeLen; return curve.zone[Math.max(0,Math.min(curve.n,Math.round(t*curve.n)))]; }
  function hollowDepth(z) {
    const r2=hollowR*hollowR, ht2=halfT*halfT;
    if (ht2>=r2) return 0;
    return Math.sqrt(Math.max(r2-z*z,0)) - Math.sqrt(r2-ht2);
  }
  const nLen=120, nThick=20;
  const positions=[], normals=[], indices=[], colors=[];
  // Bottom surface
  for (let i=0;i<=nLen;i++) {
    const x=-halfLen+(i/nLen)*bladeLen, yBase=bottomYInterp(x), zone=getZone(x), zc=new THREE.Color(ZONE_COLORS_HEX[zone]);
    for (let j=0;j<=nThick;j++) {
      const z=-halfT+(j/nThick)*bladeT;
      positions.push(x,yBase+hollowDepth(z),z); normals.push(0,-1,0); colors.push(zc.r,zc.g,zc.b);
    }
  }
  for (let i=0;i<nLen;i++) for (let j=0;j<nThick;j++) {
    const a=i*(nThick+1)+j,b=a+1,c=(i+1)*(nThick+1)+j,d=c+1; indices.push(a,c,b,b,c,d);
  }
  // Top surface
  const topOff=positions.length/3;
  for (let i=0;i<=nLen;i++) {
    const x=-halfLen+(i/nLen)*bladeLen, yBase=bottomYInterp(x), zone=getZone(x), zc=new THREE.Color(ZONE_COLORS_HEX[zone]);
    for (let j=0;j<=nThick;j++) { positions.push(x,yBase+bladeH,-halfT+(j/nThick)*bladeT); normals.push(0,1,0); colors.push(zc.r,zc.g,zc.b); }
  }
  for (let i=0;i<nLen;i++) for (let j=0;j<nThick;j++) {
    const a=topOff+i*(nThick+1)+j,b=a+1,c=topOff+(i+1)*(nThick+1)+j,d=c+1; indices.push(a,b,c,b,d,c);
  }
  // Side faces
  function addSide(zVal,nDir) {
    const off=positions.length/3;
    for (let i=0;i<=nLen;i++) {
      const x=-halfLen+(i/nLen)*bladeLen, yBot=bottomYInterp(x)+hollowDepth(zVal), yTop=bottomYInterp(x)+bladeH;
      const zone=getZone(x), zc=new THREE.Color(ZONE_COLORS_HEX[zone]);
      positions.push(x,yBot,zVal,x,yTop,zVal); normals.push(0,0,nDir,0,0,nDir); colors.push(zc.r,zc.g,zc.b,zc.r,zc.g,zc.b);
    }
    for (let i=0;i<nLen;i++) {
      const a=off+i*2,b=a+1,c=a+2,d=a+3;
      if (nDir>0) indices.push(a,c,b,b,c,d); else indices.push(a,b,c,b,d,c);
    }
  }
  addSide(halfT,1); addSide(-halfT,-1);
  // End caps
  function addEndCap(xPos,nx) {
    const off=positions.length/3;
    const yBot1=bottomYInterp(xPos)+hollowDepth(-halfT), yBot2=bottomYInterp(xPos)+hollowDepth(halfT), yTop=bottomYInterp(xPos)+bladeH;
    const zone=getZone(xPos), zc=new THREE.Color(ZONE_COLORS_HEX[zone]);
    positions.push(xPos,yBot1,-halfT,xPos,yBot2,halfT,xPos,yTop,-halfT,xPos,yTop,halfT);
    for (let k=0;k<4;k++) { normals.push(nx,0,0); colors.push(zc.r,zc.g,zc.b); }
    if (nx>0) indices.push(off,off+1,off+2,off+1,off+3,off+2); else indices.push(off,off+2,off+1,off+1,off+2,off+3);
  }
  addEndCap(halfLen,1); addEndCap(-halfLen,-1);
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  geom.setAttribute('normal',new THREE.Float32BufferAttribute(normals,3));
  geom.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
  geom.setIndex(indices); geom.computeVertexNormals();
  const bladeMat = new THREE.MeshStandardMaterial({ vertexColors:true, color:0xffffff, roughness:0.15, metalness:0.85, side:THREE.DoubleSide });
  const bladeMesh = new THREE.Mesh(geom, bladeMat); bladeMesh.castShadow=true; group.add(bladeMesh);
  // Direction arrow
  const arrowGeo = new THREE.ConeGeometry(0.005,0.015,8);
  const arrowMat = new THREE.MeshStandardMaterial({ color:0xff0000 });
  const arrow = new THREE.Mesh(arrowGeo, arrowMat);
  arrow.rotation.z = -Math.PI/2;
  arrow.position.set(halfLen+0.01, bottomYInterp(halfLen)+bladeH*0.7, 0);
  group.add(arrow);
  // TUUK Holder
  { const holderH=0.048, holderT=0.011, holderHalfT=holderT/2;
    const heelFrac=profile.zones[0], toeFrac=profile.zones[profile.zones.length-1];
    const holderStartX=-halfLen+heelFrac*bladeLen*0.35, holderEndX=halfLen-toeFrac*bladeLen*0.35;
    const holderLen=holderEndX-holderStartX, holderBaseY=bottomYInterp(0)+bladeH;
    const holderMat=new THREE.MeshStandardMaterial({color:0xf0f0f0,roughness:0.3,metalness:0.03});
    const holderDarkMat=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.5,metalness:0.08});
    const rivetMat=new THREE.MeshStandardMaterial({color:0x555555,roughness:0.25,metalness:0.85});
    function makeHolderShape() {
      const L=holderLen,H=holderH,s=new THREE.Shape();
      s.moveTo(0,0); s.lineTo(L,0);
      s.quadraticCurveTo(L*1.02,H*0.15,L*1.01,H*0.4);
      s.quadraticCurveTo(L*1.005,H*0.75,L*0.98,H);
      s.quadraticCurveTo(L*0.75,H*1.02,L*0.5,H*1.01);
      s.quadraticCurveTo(L*0.25,H*1.005,L*0.02,H);
      s.quadraticCurveTo(-L*0.005,H*0.75,-L*0.01,H*0.4);
      s.quadraticCurveTo(-L*0.005,H*0.15,0,0);
      const w1=new THREE.Path(),w1L=L*0.06,w1R=L*0.19,w1B=H*0.12,w1T=H*0.86;
      w1.moveTo(w1L,w1B);w1.quadraticCurveTo((w1L+w1R)/2,w1B-H*0.02,w1R,w1B);
      w1.quadraticCurveTo(w1R+L*0.01,(w1B+w1T)/2,w1R,w1T);
      w1.quadraticCurveTo((w1L+w1R)/2,w1T+H*0.02,w1L,w1T);
      w1.quadraticCurveTo(w1L-L*0.01,(w1B+w1T)/2,w1L,w1B); s.holes.push(w1);
      const w2=new THREE.Path(),w2L=L*0.25,w2R=L*0.49,w2B=H*0.10,w2T=H*0.88;
      w2.moveTo(w2L,w2B);w2.quadraticCurveTo((w2L+w2R)/2,w2B-H*0.02,w2R,w2B);
      w2.quadraticCurveTo(w2R+L*0.015,(w2B+w2T)/2,w2R,w2T);
      w2.quadraticCurveTo((w2L+w2R)/2,w2T+H*0.02,w2L,w2T);
      w2.quadraticCurveTo(w2L-L*0.015,(w2B+w2T)/2,w2L,w2B); s.holes.push(w2);
      const w3=new THREE.Path(),w3L=L*0.55,w3R=L*0.91,w3B=H*0.10,w3T=H*0.88;
      w3.moveTo(w3L,w3B);w3.quadraticCurveTo((w3L+w3R)/2,w3B-H*0.02,w3R,w3B);
      w3.quadraticCurveTo(w3R+L*0.015,(w3B+w3T)/2,w3R,w3T);
      w3.quadraticCurveTo((w3L+w3R)/2,w3T+H*0.02,w3L,w3T);
      w3.quadraticCurveTo(w3L-L*0.015,(w3B+w3T)/2,w3L,w3B); s.holes.push(w3);
      return s;
    }
    const holderGeom=new THREE.ExtrudeGeometry(makeHolderShape(),{depth:holderT,bevelEnabled:true,bevelThickness:0.0004,bevelSize:0.0004,bevelSegments:3});
    const holderMesh=new THREE.Mesh(holderGeom,holderMat);
    holderMesh.position.set(holderStartX,holderBaseY,-holderHalfT); holderMesh.castShadow=true; group.add(holderMesh);
    // Heel trigger
    { const L=holderLen,H=holderH,trigShape=new THREE.Shape();
      trigShape.moveTo(L*0.0,H*0.05);trigShape.lineTo(L*0.05,H*0.05);trigShape.lineTo(L*0.05,H*0.5);
      trigShape.quadraticCurveTo(L*0.04,H*0.55,L*0.0,H*0.55);trigShape.closePath();
      const trigGeom=new THREE.ExtrudeGeometry(trigShape,{depth:holderT*0.5,bevelEnabled:false});
      const trigMesh=new THREE.Mesh(trigGeom,holderDarkMat);
      trigMesh.position.set(holderStartX,holderBaseY,-holderT*0.25); group.add(trigMesh);
    }
    // Rivets
    [0.1,0.22,0.37,0.52,0.7,0.85,0.95].forEach(frac => {
      const rx=holderStartX+holderLen*frac;
      const rg=new THREE.CylinderGeometry(0.0009,0.0009,holderT+0.002,8);
      const rm=new THREE.Mesh(rg,rivetMat); rm.rotation.x=Math.PI/2;
      rm.position.set(rx,holderBaseY+holderH-0.003,0); group.add(rm);
    });
  }
  return group;
}

// Group hierarchy: bladeAssembly (position+yaw) → leanGroup → pitchGroup → yUpGroup → mesh
const yUpGroup = new THREE.Group();
yUpGroup.add(buildBladeAndHolder());
yUpGroup.rotation.x = Math.PI / 2;

const pitchGroup = new THREE.Group();
pitchGroup.add(yUpGroup);

const leanGroup = new THREE.Group();
leanGroup.add(pitchGroup);

const bladeAssembly = new THREE.Group();
bladeAssembly.add(leanGroup);
scene.add(bladeAssembly);

const LEAN_AXIS = new THREE.Vector3(1, 0, 0);
const PITCH_AXIS = new THREE.Vector3(0, 1, 0);

// Origin marker — fixed red dot at (0,0) showing start position

// Trail
const MAX_TRAIL = 2000;
const trailGeo = new THREE.BufferGeometry();
const trailPositions = new Float32Array(MAX_TRAIL * 3);
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
const trailMat = new THREE.LineBasicMaterial({ color:0x58a6ff, transparent:true, opacity:0.9, linewidth:2 });
const trailLine = new THREE.Line(trailGeo, trailMat);

let trailCount = 0;

function addTrailPoint(x, y) {
  if (trailCount < MAX_TRAIL) {
    trailPositions[trailCount * 3] = x;
    trailPositions[trailCount * 3 + 1] = y;
    trailPositions[trailCount * 3 + 2] = 0.001;
    trailCount++;
    trailGeo.setDrawRange(0, trailCount);
    trailGeo.attributes.position.needsUpdate = true;
  }
}

// Animate
let px = 0, py = 0, yaw = 0;
function animate() {
  requestAnimationFrame(animate);
  if (latestState) {
    const s = latestState;
    px = s.pos[0]; py = s.pos[1]; yaw = s.yaw || 0;

    // Position + yaw
    const pitchVal = s.pitch_val !== undefined ? s.pitch_val : 0;
    const pitchAngle = pitchVal * MAX_PITCH_RAD;
    const zCorrection = BLADE_HALF_LEN * Math.abs(Math.sin(pitchAngle));
    bladeAssembly.position.set(px, py, zCorrection);
    bladeAssembly.rotation.z = yaw;

    // Lean around blade forward axis
    const leanRad = s.lean_actual || 0;
    leanGroup.quaternion.setFromAxisAngle(LEAN_AXIS, leanRad);

    // Pitch (rocker)
    pitchGroup.quaternion.setFromAxisAngle(PITCH_AXIS, pitchAngle);

    addTrailPoint(px, py);

    // Camera follow — slow lerp so blade visibly moves ahead
    const cx = px + 0.3, cy = py - 0.3;
    camera.position.x += (cx - camera.position.x) * 0.02;
    camera.position.y += (cy - camera.position.y) * 0.02;
    controls.target.x += (px - controls.target.x) * 0.02;
    controls.target.y += (py - controls.target.y) * 0.02;
    controls.target.z = 0.02;
    controls.update();

    // Grid and ice stay FIXED — blade moves across them visually
    // (don't follow blade so user can see actual movement)

    // Update overlay
    document.getElementById('ov-speed').textContent = s.speed.toFixed(3) + ' m/s';
    document.getElementById('ov-va').textContent = (s.va || 0).toFixed(3);
    document.getElementById('ov-vp').textContent = (s.vp || 0).toFixed(3);
    document.getElementById('ov-flat').textContent = (s.f_lateral || 0).toFixed(0) + ' N';
    document.getElementById('ov-falong').textContent = (s.f_along || 0).toFixed(0) + ' N';
    document.getElementById('ov-zone').textContent = s.zone_name || '—';
    document.getElementById('ov-lean').textContent = ((s.lean_actual || 0) * 180 / Math.PI).toFixed(1) + '°';

    // Live stats panel
    document.getElementById('ls-speed').textContent = s.speed.toFixed(2);
    document.getElementById('ls-va').textContent = (s.va || 0).toFixed(3);
    document.getElementById('ls-vp').textContent = (s.vp || 0).toFixed(3);
    document.getElementById('ls-flat').textContent = (s.f_lateral || 0).toFixed(0);
  }
  renderer.render(scene, camera);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function clearStates() { states.length = 0; }

async function waitForState(timeout = 5000) {
  const t0 = Date.now();
  while (Date.now() - t0 < timeout) {
    if (latestState) return latestState;
    await sleep(50);
  }
  throw new Error('No state received');
}

function getPos() {
  if (!latestState || !latestState.pos) return [0, 0];
  return [latestState.pos[0], latestState.pos[1]];
}

async function waitAndMeasure(seconds) {
  const startPos = getPos();
  clearStates();
  await sleep(seconds * 1000);
  const collected = [...states];
  if (collected.length === 0) return { peak_speed:0, peak_va:0, peak_vp:0, peak_f_lateral:0, peak_f_along:0, zone:'', R:0, dx:0, dy:0, dist:0, startPos, endPos:startPos, final_x:startPos[0], final_y:startPos[1], final_speed:0, final_va:0, final_vp:0, pen:0, waypoints:[], yaw:0 };
  let peak_speed=0, peak_va=0, peak_vp=0, peak_f_lat=0, peak_f_along=0;
  let lastZone='', lastR=0;
  // Collect waypoints at regular intervals (every ~10th state)
  const waypoints = [];
  const step = Math.max(1, Math.floor(collected.length / 20));
  for (let i = 0; i < collected.length; i++) {
    const s = collected[i];
    peak_speed = Math.max(peak_speed, Math.abs(s.speed || 0));
    peak_va = Math.max(peak_va, Math.abs(s.va || 0));
    peak_vp = Math.max(peak_vp, Math.abs(s.vp || 0));
    peak_f_lat = Math.max(peak_f_lat, Math.abs(s.f_lateral || 0));
    peak_f_along = Math.max(peak_f_along, Math.abs(s.f_along || 0));
    lastZone = s.zone_name || lastZone;
    lastR = s.R || lastR;
    if (i % step === 0 && s.pos) {
      waypoints.push({ x: s.pos[0], y: s.pos[1], yaw: s.yaw || 0, speed: s.speed || 0 });
    }
  }
  const last = collected[collected.length - 1];
  const endPos = last.pos ? [last.pos[0], last.pos[1]] : startPos;
  if (last.pos) waypoints.push({ x: last.pos[0], y: last.pos[1], yaw: last.yaw || 0, speed: last.speed || 0 });
  const dx = endPos[0] - startPos[0];
  const dy = endPos[1] - startPos[1];
  const dist = Math.sqrt(dx * dx + dy * dy);
  return {
    peak_speed, peak_va, peak_vp,
    peak_f_lateral: peak_f_lat, peak_f_along,
    zone: lastZone, R: lastR,
    pen: last.pen || 0,
    final_speed: Math.abs(last.speed || 0),
    final_va: Math.abs(last.va || 0),
    final_vp: Math.abs(last.vp || 0),
    startPos, endPos, dx, dy, dist,
    final_x: endPos[0], final_y: endPos[1],
    yaw: last.yaw || 0,
    waypoints,
  };
}

// Compute arc curvature from waypoints: fit a circle to the trajectory
function computeArcRadius(waypoints) {
  if (waypoints.length < 5) return { radius: Infinity, isCurved: false, maxDeviation: 0 };
  // Measure deviation from straight line (start→end)
  const sx = waypoints[0].x, sy = waypoints[0].y;
  const ex = waypoints[waypoints.length - 1].x, ey = waypoints[waypoints.length - 1].y;
  const lineLen = Math.sqrt((ex - sx) ** 2 + (ey - sy) ** 2);
  if (lineLen < 0.01) return { radius: Infinity, isCurved: false, maxDeviation: 0 };
  // Direction of line
  const dx = (ex - sx) / lineLen, dy = (ey - sy) / lineLen;
  let maxDev = 0;
  let sumDev = 0;
  let devCount = 0;
  for (const wp of waypoints) {
    // Distance from point to line start→end
    const px = wp.x - sx, py = wp.y - sy;
    const cross = Math.abs(px * dy - py * dx);  // perpendicular distance to line
    maxDev = Math.max(maxDev, cross);
    sumDev += cross;
    devCount++;
  }
  const avgDev = sumDev / devCount;
  // Approximate radius from chord length and sagitta (max deviation)
  // R ≈ (L² / 8h) + h/2 where L = chord, h = sagitta (max deviation)
  let radius = Infinity;
  if (maxDev > 0.001) {
    radius = (lineLen * lineLen) / (8 * maxDev) + maxDev / 2;
  }
  return { radius, isCurved: maxDev > 0.02, maxDeviation: maxDev, avgDeviation: avgDev };
}

// Compute total yaw change from waypoints
function computeYawChange(waypoints) {
  if (waypoints.length < 2) return 0;
  return Math.abs(waypoints[waypoints.length - 1].yaw - waypoints[0].yaw);
}

// ── Position Check Helper ──
// Check if actual position is near expected target within tolerance
function posNear(actual, expected, tol) {
  return Math.abs(actual - expected) <= tol;
}
function posCheck(mx, my, ex, ey, tolX, tolY) {
  return posNear(mx, ex, tolX) && posNear(my, ey, tolY);
}

// ══════════════════════════════════════════════════════════════════
// TESTS — Based on real-world ice skating physics
// Reference: real-world-physics-problems.com/physics-of-ice-skating.html
// ══════════════════════════════════════════════════════════════════

// ── Test 1: "Friction of the blade with the ice is almost zero" ──
// Article: "the friction of the blade with the ice is almost zero"
// → Along-blade glide should produce near-zero friction force
// → Blade should coast far from a single push (low deceleration)
// → At 0° lean, path should be STRAIGHT (waypoints check)
async function test1() {
  const e = addTestEntry('Test 1: Straight glide path (Article: "friction almost zero")');
  updateProgress('Test 1/10: Straight glide');
  await reset();
  await setLean(0);
  await push(1, 0, 1.5);
  const m = await waitAndMeasure(2.5);
  const arc = computeArcRadius(m.waypoints);
  addValues(e, `f_along=${m.peak_f_along.toFixed(1)}N | v=${m.peak_va.toFixed(3)} m/s | pos=(${m.final_x.toFixed(3)}, ${m.final_y.toFixed(3)}) | ${m.waypoints.length} waypoints | path deviation=${(arc.maxDeviation*100).toFixed(1)}cm`);
  const p1 = m.peak_f_along < 5;
  const p2 = m.final_x > 1.5;
  const p3 = !arc.isCurved; // at 0° lean, path should NOT curve
  const p4 = m.waypoints.length >= 5;
  const p5 = Math.abs(m.final_y) < 0.05;
  addCheck(e, `Along-blade friction ≈ 0: f_along=${m.peak_f_along.toFixed(1)}N (< 5N)`, p1);
  addCheck(e, `Blade coasts to x=${m.final_x.toFixed(3)}m (> 1.5m — low friction)`, p2);
  addCheck(e, `Path is STRAIGHT at 0° lean: maxDev=${(arc.maxDeviation*100).toFixed(1)}cm (< 2cm)`, p3);
  addCheck(e, `Trajectory has ${m.waypoints.length} waypoints (≥ 5 sampled)`, p4);
  addCheck(e, `Stays on-axis: y=${m.final_y.toFixed(3)}m (< 0.05m drift)`, p5);
  finishTest(e, p1 && p2 && p3 && p4 && p5);
}

// ── Test 2: "Skater pushes off perpendicular to blade" — groove blocks this ──
// Article: "propels himself forward by pushing off the ice with a force
//           perpendicular to the skate blade"
// In real skating: push foot goes sideways → reaction force → forward on glide foot
// Our single-blade test: a sideways push IS perpendicular to blade → groove resists it
// → Blade should barely move (groove walls block lateral motion)
async function test2() {
  const e = addTestEntry('Test 2: Groove resists perpendicular push (Article: "push off perpendicular")');
  updateProgress('Test 2/10: Perpendicular push');
  await reset();
  await setLean(15);
  await push(0, 1, 1.5);
  const m = await waitAndMeasure(1.5);
  // Physics: groove walls physically block sideways motion
  // Blade should stay near origin
  addValues(e, `F_lateral=${m.peak_f_lateral.toFixed(1)}N | vp=${m.peak_vp.toFixed(4)} m/s | pos=(${m.final_x.toFixed(3)}, ${m.final_y.toFixed(3)}) expect≈(0, 0)`);
  const p1 = m.peak_f_lateral > 10;
  const p2 = Math.abs(m.final_x) < 0.02;
  const p3 = Math.abs(m.final_y) < 0.02;
  const p4 = m.dist < 0.05;
  addCheck(e, `Groove generates lateral resistance: F=${m.peak_f_lateral.toFixed(1)}N (> 10N)`, p1);
  addCheck(e, `Blade stays at x=${m.final_x.toFixed(3)} (< 0.02m from origin)`, p2);
  addCheck(e, `Blade stays at y=${m.final_y.toFixed(3)} (< 0.02m from origin)`, p3);
  addCheck(e, `Total displacement only ${(m.dist*100).toFixed(1)}cm (< 5cm)`, p4);
  finishTest(e, p1 && p2 && p3 && p4);
}

// ── Test 3: Anisotropy — "friction almost zero" along vs high perp ──
// Article: forward glide = "friction almost zero", but edge digs in laterally
// → Forward distance >> sideways distance (same force magnitude)
// → Forward trajectory has waypoints extending far; sideways stays at origin
async function test3() {
  const e = addTestEntry('Test 3: Anisotropy — trajectory comparison (Article: glide vs dig-in)');
  updateProgress('Test 3/10: Anisotropy');
  // Forward push (lean=0 for clean straight path)
  await reset(); await setLean(0);
  await push(1, 0, 1.5);
  const fwd = await waitAndMeasure(2.5);
  // Sideways push (lean=15 to engage groove)
  await reset(); await setLean(15);
  await push(0, 1, 1.5);
  const side = await waitAndMeasure(2.0);

  const distRatio = side.dist > 0.001 ? fwd.dist / side.dist : 999;
  // Check that forward waypoints span a wide range but sideways waypoints are clustered
  const fwdSpread = fwd.waypoints.length > 1 ? Math.sqrt((fwd.waypoints[fwd.waypoints.length-1].x - fwd.waypoints[0].x)**2 + (fwd.waypoints[fwd.waypoints.length-1].y - fwd.waypoints[0].y)**2) : 0;
  const sideSpread = side.waypoints.length > 1 ? Math.sqrt((side.waypoints[side.waypoints.length-1].x - side.waypoints[0].x)**2 + (side.waypoints[side.waypoints.length-1].y - side.waypoints[0].y)**2) : 0;
  addValues(e, `fwd: ${fwd.waypoints.length}pts dist=${fwd.dist.toFixed(3)}m spread=${fwdSpread.toFixed(3)}m | side: ${side.waypoints.length}pts dist=${side.dist.toFixed(3)}m spread=${sideSpread.toFixed(4)}m | ratio=${distRatio.toFixed(1)}x`);
  document.getElementById('ls-aniso').textContent = (fwd.final_speed > 0.001 && side.final_speed > 0.001 ? (fwd.final_speed/side.final_speed).toFixed(1) : '∞') + 'x';
  const p1 = fwd.dist > 1.5;
  const p2 = side.dist < 0.05;
  const p3 = distRatio > 10;
  const p4 = fwdSpread > 0.3; // waypoint spread during coast phase
  const p5 = sideSpread < 0.05;
  addCheck(e, `Forward glides ${fwd.dist.toFixed(3)}m (> 1.5m — "friction almost zero")`, p1);
  addCheck(e, `Sideways only ${(side.dist*100).toFixed(1)}cm (< 5cm — groove blocks)`, p2);
  addCheck(e, `Distance ratio ${distRatio.toFixed(1)}x (> 10x anisotropy)`, p3);
  addCheck(e, `Forward path spans ${fwdSpread.toFixed(3)}m (> 0.3m coast spread)`, p4);
  addCheck(e, `Sideways path clustered: ${(sideSpread*100).toFixed(2)}cm spread (< 5cm)`, p5);
  finishTest(e, p1 && p2 && p3 && p4 && p5);
}

// ── Test 4: F=ma — Newton's Second Law ──
// Article: heavier skater accelerates slower with same push force
// F=ma → a = F/m → v = F·t/m → x = ½·F·t²/m (during push) + coast
// 60kg vs 120kg: speed ratio should be ~2.0x, distance ratio ~2.0x
async function test4() {
  const e = addTestEntry('Test 4: F=ma — Newton\'s Second Law (Article: mass affects acceleration)');
  updateProgress('Test 4/10: F=ma');
  // Light skater (60kg) — use lean=0 for clean straight-line F=ma comparison
  await reset(); await setLean(0); await setWeight(60);
  await push(1, 0, 1.5);
  const light = await waitAndMeasure(1.5);
  // Heavy skater (120kg) — same lean=0 for fair comparison
  await reset(); await setLean(0); await setWeight(120);
  await push(1, 0, 1.5);
  const heavy = await waitAndMeasure(1.5);
  await setWeight(85); // restore default

  const speedRatio = heavy.peak_speed > 0 ? light.peak_speed / heavy.peak_speed : 999;
  const distRatio = heavy.dist > 0 ? light.dist / heavy.dist : 999;
  // F=ma: a₁/a₂ = m₂/m₁ = 120/60 = 2.0
  addValues(e, `light(60kg): v=${light.peak_speed.toFixed(3)} pos=(${light.final_x.toFixed(3)},${light.final_y.toFixed(3)}) | heavy(120kg): v=${heavy.peak_speed.toFixed(3)} pos=(${heavy.final_x.toFixed(3)},${heavy.final_y.toFixed(3)}) | speed_ratio=${speedRatio.toFixed(2)}x`);
  const p1 = light.peak_speed > heavy.peak_speed;
  const p2 = speedRatio > 1.3 && speedRatio < 3.0;
  const p3 = light.final_x > heavy.final_x;
  const p4 = light.final_x > 1.5;
  const p5 = heavy.final_x > 0.8;
  addCheck(e, `Light faster: ${light.peak_speed.toFixed(3)} > ${heavy.peak_speed.toFixed(3)} m/s`, p1);
  addCheck(e, `Speed ratio ≈ 2.0x (F=ma): ${speedRatio.toFixed(2)}x (1.3-3.0x range)`, p2);
  addCheck(e, `Light goes further: x=${light.final_x.toFixed(3)} > x=${heavy.final_x.toFixed(3)}`, p3);
  addCheck(e, `Light reaches realistic distance: x=${light.final_x.toFixed(3)}m (> 1.5m)`, p4);
  addCheck(e, `Heavy reaches realistic distance: x=${heavy.final_x.toFixed(3)}m (> 0.8m)`, p5);
  finishTest(e, p1 && p2 && p3 && p4 && p5);
}

// ── Test 5: Fy=mg — Vertical equilibrium ──
// Article: "center of mass G has zero vertical acceleration... Fy = mg"
// The blade sits on the ice. Contact normal force = weight.
// Blade never goes below ice (z≥0).
async function test5() {
  const e = addTestEntry('Test 5: Fy=mg — Vertical equilibrium (Article: Fy=mg)');
  updateProgress('Test 5/10: Vertical equilibrium');
  await reset(); await setLean(0);
  await sleep(500);
  const atRest = latestState;
  // Push and measure during motion
  await push(1, 0, 1.5);
  const m = await waitAndMeasure(1.0);
  // z position should always be ≥ 0 (blade on ice, never below)
  const z = atRest.pos ? atRest.pos[2] : 0;
  const weight = 85 * 9.81; // 833.85N
  addValues(e, `z=${(z*1000).toFixed(1)}mm | weight=85kg×9.81=${weight.toFixed(1)}N | blade at rest on ice`);
  const p1 = z >= -0.001;
  const p2 = m.peak_speed > 0;
  const p3 = m.peak_speed < 15;
  addCheck(e, `Blade on ice surface: z=${(z*1000).toFixed(1)}mm (≥ 0, not below ice)`, p1);
  addCheck(e, `Blade responds to push: v=${m.peak_speed.toFixed(3)} m/s (gravity doesn't pull through)`, p2);
  addCheck(e, `Speed realistic: ${m.peak_speed.toFixed(3)} m/s (< 15 m/s)`, p3);
  finishTest(e, p1 && p2 && p3);
}

// ── Test 6: Turn radius from rocker zones ──
// Article: centripetal turn analysis with Fx = mv²/R
// Our blade has rocker zones: heel=6'(1.83m), center=9'(2.74m), toe=15'(4.57m)
// Different pitch positions → different turn radii
async function test6() {
  const e = addTestEntry('Test 6: Rocker zones — turn radius selection (Article: centripetal turns)');
  updateProgress('Test 6/10: Rocker zones');
  await reset();
  await setPitch(-1); await sleep(800);
  const heel = latestState;
  await setPitch(0); await sleep(800);
  const center = latestState;
  await setPitch(1); await sleep(800);
  const toe = latestState;

  const hR = heel.R || 0, cR = center.R || 0, tR = toe.R || 0;
  const hz = heel.zone_name || '', cz = center.zone_name || '', tz = toe.zone_name || '';
  // Article's centripetal formula: tan(θ) = v²/(Rg)
  // For R=8.5m, v=10m/s → θ=39.8° (article sample)
  // Our zones: R=1.83m (tight), 2.74m (medium), 4.57m (wide)
  addValues(e, `heel=${hz} R=${hR.toFixed(2)}m | center=${cz} R=${cR.toFixed(2)}m | toe=${tz} R=${tR.toFixed(2)}m`);
  const p1 = hz.includes('Zone 1');
  const p2 = cz.includes('Zone 2') || cz.includes('Zone 3');
  const p3 = tz.includes('Zone 4');
  const p4 = hR < cR && cR < tR;
  const p5 = hR > 1.0 && tR < 6.0;
  addCheck(e, `Heel = Zone 1 (6' radius): ${hz}`, p1);
  addCheck(e, `Center = Zone 2-3 (9'-12'): ${cz}`, p2);
  addCheck(e, `Toe = Zone 4 (15' radius): ${tz}`, p3);
  addCheck(e, `Radius increases heel→toe: ${hR.toFixed(2)} < ${cR.toFixed(2)} < ${tR.toFixed(2)}m`, p4);
  addCheck(e, `Radii in realistic range: ${hR.toFixed(2)}-${tR.toFixed(2)}m (1-6m)`, p5);
  finishTest(e, p1 && p2 && p3 && p4 && p5);
}

// ── Test 7: Lean produces arc path — "dig in to go around a turn" ──
// Article: "skater can dig in with his skate to go around a turn"
// When leaned, the edge cuts a curved groove → blade follows an ARC
// 0° lean = straight path. 15° lean = gentle arc. 45° lean = tight arc.
// More lean → more curvature → smaller arc radius
async function test7() {
  const e = addTestEntry('Test 7: Lean → arc path (Article: "dig in to go around a turn")');
  updateProgress('Test 7/10: Arc from lean');
  // 0° lean: straight path
  await reset(); await setLean(0);
  await push(1, 0, 1.5);
  const straight = await waitAndMeasure(2.5);
  const arcStraight = computeArcRadius(straight.waypoints);
  // 15° lean: gentle arc
  await reset(); await setLean(15);
  await push(1, 0, 1.5);
  const gentle = await waitAndMeasure(2.5);
  const arcGentle = computeArcRadius(gentle.waypoints);
  // 45° lean: tight arc
  await reset(); await setLean(45);
  await push(1, 0, 1.5);
  const tight = await waitAndMeasure(2.5);
  const arcTight = computeArcRadius(tight.waypoints);

  const yawStraight = computeYawChange(straight.waypoints) * 180/Math.PI;
  const yawGentle = computeYawChange(gentle.waypoints) * 180/Math.PI;
  const yawTight = computeYawChange(tight.waypoints) * 180/Math.PI;

  addValues(e, `0°lean: dev=${(arcStraight.maxDeviation*100).toFixed(1)}cm yaw=${yawStraight.toFixed(1)}° | 15°lean: dev=${(arcGentle.maxDeviation*100).toFixed(1)}cm yaw=${yawGentle.toFixed(1)}° R≈${arcGentle.radius.toFixed(1)}m | 45°lean: dev=${(arcTight.maxDeviation*100).toFixed(1)}cm yaw=${yawTight.toFixed(1)}° R≈${arcTight.radius.toFixed(1)}m`);

  const p1 = !arcStraight.isCurved; // 0° lean = straight
  const p2 = arcGentle.isCurved; // 15° lean = curved
  const p3 = arcTight.isCurved; // 45° lean = curved
  const p4 = arcTight.maxDeviation > arcGentle.maxDeviation; // more lean = more curvature
  const p5 = yawTight > yawGentle; // more lean = more heading change
  addCheck(e, `0° lean path is STRAIGHT: maxDev=${(arcStraight.maxDeviation*100).toFixed(1)}cm (< 2cm)`, p1);
  addCheck(e, `15° lean path is CURVED: maxDev=${(arcGentle.maxDeviation*100).toFixed(1)}cm (> 2cm)`, p2);
  addCheck(e, `45° lean path is CURVED: maxDev=${(arcTight.maxDeviation*100).toFixed(1)}cm (> 2cm)`, p3);
  addCheck(e, `More lean → more curvature: 45° dev ${(arcTight.maxDeviation*100).toFixed(1)}cm > 15° dev ${(arcGentle.maxDeviation*100).toFixed(1)}cm`, p4);
  addCheck(e, `More lean → more yaw: 45° Δyaw=${yawTight.toFixed(1)}° > 15° Δyaw=${yawGentle.toFixed(1)}°`, p5);
  finishTest(e, p1 && p2 && p3 && p4 && p5);
}

// ── Test 8: Arc radius matches rocker zone ──
// Article: centripetal analysis — turn radius depends on rocker zone
// Heel (Zone 1, R=1.83m) → tighter arc than Toe (Zone 4, R=4.57m)
// At same lean angle, different pitch → different arc curvature
// Also verify: article formula tan(θ) = v²/(Rg)
async function test8() {
  const e = addTestEntry('Test 8: Arc radius matches rocker zone (Article: centripetal R)');
  updateProgress('Test 8/10: Arc vs rocker');
  // Push at 45° lean with different rocker zones — measure arc radius
  // Heel (Zone 1, R=1.83m): tightest arc
  await reset(); await setLean(45); await setPitch(-1);
  await push(1, 0, 1.5);
  const heel = await waitAndMeasure(2.5);
  const arcHeel = computeArcRadius(heel.waypoints);
  // Center (Zone 2, R=2.74m): medium arc
  await reset(); await setLean(45); await setPitch(0);
  await push(1, 0, 1.5);
  const center = await waitAndMeasure(2.5);
  const arcCenter = computeArcRadius(center.waypoints);
  // Toe (Zone 4, R=4.57m): widest arc
  await reset(); await setLean(45); await setPitch(1);
  await push(1, 0, 1.5);
  const toe = await waitAndMeasure(2.5);
  const arcToe = computeArcRadius(toe.waypoints);

  // Article formula verification
  const g = 9.81;
  const articleTheta = Math.atan(100/(8.5*g)) * 180/Math.PI;

  addValues(e, `heel(Z1): R≈${arcHeel.radius.toFixed(1)}m dev=${(arcHeel.maxDeviation*100).toFixed(1)}cm | center(Z2): R≈${arcCenter.radius.toFixed(1)}m dev=${(arcCenter.maxDeviation*100).toFixed(1)}cm | toe(Z4): R≈${arcToe.radius.toFixed(1)}m dev=${(arcToe.maxDeviation*100).toFixed(1)}cm | Article: tan(θ)=v²/Rg → θ=${articleTheta.toFixed(1)}°`);

  const p1 = arcHeel.isCurved && arcCenter.isCurved && arcToe.isCurved;
  const p2 = arcHeel.maxDeviation > arcCenter.maxDeviation || arcCenter.maxDeviation > arcToe.maxDeviation; // smaller R → tighter turn → more deviation
  const p3 = arcHeel.maxDeviation > arcToe.maxDeviation || arcHeel.radius < arcToe.radius; // heel curves more (tighter R) OR measured R is smaller
  const p4 = articleTheta > 35 && articleTheta < 55; // article formula check
  const p5 = arcCenter.radius > 1.0 && arcCenter.radius < 100.0; // realistic range (chord method overestimates when decelerating)
  addCheck(e, `All rocker zones produce curved arc paths`, p1);
  addCheck(e, `Heel (tight R) curves more than Toe (wide R): heel dev=${(arcHeel.maxDeviation*100).toFixed(1)}cm`, p2);
  addCheck(e, `Heel R tighter than Toe: dev_heel=${(arcHeel.maxDeviation*100).toFixed(1)}cm > dev_toe=${(arcToe.maxDeviation*100).toFixed(1)}cm`, p3);
  addCheck(e, `Article formula: R=8.5m, v=10 → θ=${articleTheta.toFixed(1)}° (near 39.8°-50.2°)`, p4);
  addCheck(e, `Measured arc radius realistic: ${arcCenter.radius.toFixed(1)}m (1-100m range)`, p5);
  finishTest(e, p1 && p2 && p3 && p4 && p5);
}

// ── Test 9: Speed stays in realistic range ──
// Article: "skater can at most move his feet at about 7 m/s"
// "maximum speed... is directly influenced by how fast he can move his feet"
// Our simulation should produce speeds in realistic skating range
// Speed skaters: 10-15 m/s. Casual: 3-7 m/s. Single push: < 1 m/s
async function test9() {
  const e = addTestEntry('Test 9: Realistic speed range (Article: max foot speed ~7 m/s)');
  updateProgress('Test 9/10: Speed realism');
  // Single push at different force levels (lean=0 for clean straight comparison)
  await reset(); await setLean(0);
  await push(1, 0, 1.5);
  const single = await waitAndMeasure(1.5);
  // Stronger push
  await reset(); await setLean(0);
  await push(3, 0, 1.5);
  const strong = await waitAndMeasure(1.5);
  // Very strong push
  await reset(); await setLean(0);
  await push(5, 0, 1.5);
  const vstrong = await waitAndMeasure(1.5);

  addValues(e, `1N: v=${single.peak_speed.toFixed(3)} pos=(${single.final_x.toFixed(2)},${single.final_y.toFixed(2)}) | 3N: v=${strong.peak_speed.toFixed(3)} pos=(${strong.final_x.toFixed(2)},${strong.final_y.toFixed(2)}) | 5N: v=${vstrong.peak_speed.toFixed(3)} pos=(${vstrong.final_x.toFixed(2)},${vstrong.final_y.toFixed(2)})`);
  const p1 = single.peak_speed < 7;
  const p2 = single.peak_speed > 0.05;
  const p3 = strong.peak_speed > single.peak_speed;
  const p4 = strong.final_x > single.final_x;
  const p5 = vstrong.peak_speed < 15;
  addCheck(e, `Single push speed < 7 m/s (article max foot speed): ${single.peak_speed.toFixed(3)} m/s`, p1);
  addCheck(e, `Blade actually moves: ${single.peak_speed.toFixed(3)} > 0.05 m/s`, p2);
  addCheck(e, `Stronger push = faster: ${strong.peak_speed.toFixed(3)} > ${single.peak_speed.toFixed(3)} m/s`, p3);
  addCheck(e, `Stronger push = further: x=${strong.final_x.toFixed(3)} > x=${single.final_x.toFixed(3)}`, p4);
  addCheck(e, `Max speed realistic (< 15 m/s): ${vstrong.peak_speed.toFixed(3)} m/s`, p5);
  finishTest(e, p1 && p2 && p3 && p4 && p5);
}

// ── Test 10: Combined skating paths — lean + pitch + arc verification ──
// Article: "skater can dig in with his skate to go around a turn, speed up, or stop"
// Test different lean+pitch combos and verify each produces a distinct arc trajectory
// More lean → tighter arc; different rocker → different curvature
// Each config should produce forward motion AND a measurable trajectory
async function test10() {
  const e = addTestEntry('Test 10: Combined skating arcs (Article: lean + pitch + glide)');
  updateProgress('Test 10/10: Combined arcs');
  const configs = [
    { lean: 15, pitch: 0,  label: '15° center' },
    { lean: 30, pitch: -1, label: '30° heel' },
    { lean: 30, pitch: 1,  label: '30° toe' },
    { lean: 45, pitch: 0,  label: '45° center' },
  ];
  let allMove = true, allRealistic = true;
  let allHaveWaypoints = true;
  let leanCurvatureScales = true;
  let valStr = '';
  const results = [];
  for (const c of configs) {
    await reset(); await setLean(c.lean); await setPitch(c.pitch);
    await push(1, 0, 1.5);
    const m = await waitAndMeasure(2.0);
    const arc = computeArcRadius(m.waypoints);
    results.push({ ...c, m, arc });
    if (m.peak_va < 0.05) allMove = false;
    if (m.peak_speed > 15 || m.dist < 0.3) allRealistic = false;
    if (m.waypoints.length < 3) allHaveWaypoints = false;
    valStr += `${c.label}: v=${m.peak_va.toFixed(2)} pos=(${m.final_x.toFixed(2)},${m.final_y.toFixed(2)}) dev=${(arc.maxDeviation*100).toFixed(1)}cm ${arc.isCurved?'ARC':'—'} | `;
  }
  // More lean should produce more curvature: 45° center should curve more than 15° center
  const r15c = results.find(r => r.lean === 15 && r.pitch === 0);
  const r45c = results.find(r => r.lean === 45 && r.pitch === 0);
  if (r15c && r45c) {
    leanCurvatureScales = r45c.arc.maxDeviation > r15c.arc.maxDeviation;
  }
  addValues(e, valStr);
  const p1 = allMove;
  const p2 = allRealistic;
  const p3 = allHaveWaypoints;
  const p4 = leanCurvatureScales;
  addCheck(e, `All configs produce forward motion (va > 0.05 m/s)`, p1);
  addCheck(e, `All speeds and paths realistic (v < 15, dist > 0.3m)`, p2);
  addCheck(e, `All paths have waypoints (≥ 3 per trajectory)`, p3);
  addCheck(e, `45° lean curves more than 15° lean at same pitch`, p4);
  finishTest(e, p1 && p2 && p3 && p4);
}

// ── Run All Tests ──
async function startTests() {
  if (testRunning) return;
  testRunning = true;
  totalChecks = 0; passedChecks = 0; failedChecks = 0;
  testLog.innerHTML = '';
  document.getElementById('score-display').style.display = 'none';
  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-run').textContent = 'RUNNING...';

  try {
    // Double reset to ensure clean state between suite runs
    await reset();
    await reset();
    await test1();
    await test2();
    await test3();
    await test4();
    await test5();
    await test6();
    await test7();
    await test8();
    await test9();
    await test10();
  } catch (err) {
    const e = addTestEntry('ERROR: ' + err.message);
    finishTest(e, false);
  }

  // Show final score
  const scoreDiv = document.getElementById('score-display');
  scoreDiv.style.display = 'block';
  const scoreEl = document.getElementById('final-score');
  const detailEl = document.getElementById('final-detail');
  scoreEl.textContent = `${passedChecks} / ${totalChecks}`;
  scoreEl.style.color = failedChecks === 0 ? '#3fb950' : '#d29922';
  detailEl.textContent = failedChecks === 0
    ? 'ALL TESTS PASSED — physics matches real-world skating (article verified)'
    : `${failedChecks} check(s) failed — see log above`;

  document.getElementById('current-test-display').textContent =
    failedChecks === 0 ? 'ALL PASSED' : `${passedChecks} passed, ${failedChecks} failed`;
  document.getElementById('prog-label').textContent = 'Complete';
  document.getElementById('pbar').style.width = '100%';

  document.getElementById('btn-run').disabled = false;
  document.getElementById('btn-run').textContent = 'RUN AGAIN';
  testRunning = false;
}
</script>
